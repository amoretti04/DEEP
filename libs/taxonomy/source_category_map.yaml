# ── Keyword patterns (fallback after exact match) ────────────────────
# Ordered: first pattern that matches wins. Patterns are lowercase
# substring checks on the normalized category string. Keep them narrow.
patterns:
  # Gazettes
  - { contains: ["gazette"], code: GAZ }
  - { contains: ["bulletin"], code: GAZ }
  - { contains: ["journal"], code: GAZ }
  # Courts
  - { contains: ["tribunal"], code: COURT }
  - { contains: ["court"], code: COURT }
  # Insolvency registers / info
  - { contains: ["insolvency register"], code: INS-REG }
  - { contains: ["bankruptcy register"], code: INS-REG }
  - { contains: ["insolvency"], code: INS-REG }   # last-resort for INS-REG
  # Auctions
  - { contains: ["auction"], code: AUCT }
  - { contains: ["asset manager", "asset advisor", "asset marketplace"], code: AUCT }
  # Registry
  - { contains: ["registry", "register"], code: REG }
  # Credit / business info
  - { contains: ["credit bureau", "credit rating", "credit insurance"], code: CRED }
  - { contains: ["business information", "business info"], code: CRED }
  # News / press + commentary
  - { contains: ["newspaper", "news", "magazine", "press", "weekly"], code: NEWS }
  - { contains: ["advisor", "advisory", "consultancy", "insights", "research"], code: NEWS }
  # Regulator / supervisor / central bank / government
  - { contains: ["regulator", "supervisor", "central bank", "authority"], code: REGU }
  - { contains: ["government", "ministry", "state "], code: REGU }
  # Markets
  - { contains: ["exchange", "market"], code: MKT }
