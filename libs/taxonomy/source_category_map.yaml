# Source category normalization.
#
# The blueprint workbook contains 200+ free-text category labels, mostly
# singletons. This file maps them onto the 9 canonical codes defined in
# CLAUDE.md §5.1.
#
# Strategy: exact match first, then keyword-pattern match, then UNKNOWN.
# UNKNOWN entries are surfaced in the importer's review queue, never
# silently bucketed.
#
# When you add a source and its category is not yet mapped, either add an
# exact-match entry here or extend the keyword patterns. Never broaden a
# pattern so aggressively that it swallows unrelated categories — a false
# mapping is harder to detect than an UNKNOWN.

# ── 9 canonical codes (CLAUDE.md §5.1) ───────────────────────────────
codes:
  GAZ: "Official gazette / state bulletin"
  COURT: "Bankruptcy tribunal or commercial/insolvency court"
  INS-REG: "Insolvency register (national)"
  AUCT: "Judicial or industrial auction platform"
  REG: "Company / commercial registry"
  CRED: "Credit bureau or business-information provider"
  NEWS: "Financial press / insolvency news"
  REGU: "Regulator / supervisory authority"
  MKT: "Market data / listed-company distress disclosures"

