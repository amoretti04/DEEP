[alembic]
script_location = infra/alembic
prepend_sys_path = .
path_separator = os
timezone = UTC
version_num_format = %%04d

# Will be read from env; override here for local one-offs.
sqlalchemy.url = postgresql+asyncpg://dip:dip_local_only@localhost:5432/dip

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
