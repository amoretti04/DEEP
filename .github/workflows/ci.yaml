name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Secret scanning — runs before anything else ────────────────────
  secrets:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Python: lint, type-check, test ─────────────────────────────────
  python:
    name: Python (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: secrets
    strategy:
      fail-fast: false
      matrix:
        suite: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        if: matrix.suite == 'lint'
        run: |
          ruff check libs services scripts tests
          ruff format --check libs services scripts tests

      - name: Type-check (mypy --strict)
        if: matrix.suite == 'typecheck'
        run: mypy libs services scripts

      - name: Tests + coverage ≥85%
        if: matrix.suite == 'test'
        run: |
          pytest -m "not integration" \
            --cov --cov-report=xml --cov-report=term-missing --cov-fail-under=85

      - name: Upload coverage
        if: matrix.suite == 'test'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # ── Validate every Source Card against the schema ─────────────────
  sources:
    name: Validate Source Cards
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -e ".[dev]"
      - run: python -m scripts.validate_sources

  # ── Frontend ───────────────────────────────────────────────────────
  web:
    name: Web build
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - working-directory: services/web
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

  # ── SBOM (supply-chain transparency) ──────────────────────────────
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install cyclonedx-bom
      - run: cyclonedx-py environment -o sbom.json || cyclonedx-py -o sbom.json . || true
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: warn
